<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Ice Cream</title>

<style>
/* ===== GLOBAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(120deg,#ff9a9e,#fad0c4,#fbc2eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== ORDER BOX ===== */
.container{
    width:420px;
    background:rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    animation: fadeIn 1.2s ease;
}

h1{
    text-align:center;
    color:#ff4d6d;
    margin-bottom:25px;
}

/* ===== FORM ===== */
label{
    font-weight:600;
    color:#333;
}

input, select{
    width:100%;
    padding:12px;
    margin:8px 0 18px;
    border:none;
    border-radius:12px;
    outline:none;
    background:#fff;
    transition:0.3s;
}

input:focus, select:focus{
    transform:scale(1.03);
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* ===== BUTTON ===== */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#ff4d6d,#ff758c);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.4s;
}

button:hover{
    transform:scale(1.07);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>🍦 Order Now</h1>

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Choose Flavor</label>
        <select>
            <option>Strawberry</option>
            <option>Chocolate</option>
            <option>Vanilla</option>
            <option>Mango</option>
        </select>

        <label>Quantity</label>
        <input type="number" placeholder="Number of scoops">

        <label>Delivery Address</label>
        <input type="text" placeholder="Enter address">

        <button>Place Order</button>
    </form>
</div>

</body>
</html>
