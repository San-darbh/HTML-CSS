<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Cream Varieties</title>

<style>
/* ===== GLOBAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(120deg,#ff9a9e,#fad0c4,#fbc2eb);
    min-height:100vh;
}

/* ===== SECTION ===== */
.section{
    text-align:center;
    padding:50px 20px;
}

.section h1{
    color:#ff4d6d;
    font-size:42px;
    margin-bottom:30px;
}

/* ===== CARDS ===== */
.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.card{
    width:230px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-15px) scale(1.05);
}

/* ===== IMAGE ===== */
.card img{
    width:100%;
    height:170px;
    object-fit:cover;
}

/* ===== TEXT ===== */
.card h3{
    margin:15px 0 5px;
}

.price{
    color:#ff4d6d;
    font-weight:bold;
    margin-bottom:12px;
}

/* ===== BUTTON ===== */
button{
    margin-bottom:18px;
    padding:10px 22px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#ff4d6d,#ff758c);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    box-shadow:0 8px 18px rgba(0,0,0,0.25);
}
.test{
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<section class="section">
    <h1>🍦 Our Ice Cream Varieties</h1>

    <div class="container">

        <div class="card">
            <img src="imags/strawberry.jpg">
            <h3>Strawberry</h3>
            <div class="price">₹120</div>
           <a class="test"  href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>

        <div class="card">
            <img src="imags/choclate.jpg">
            <h3>Chocolate</h3>
            <div class="price">₹140</div>
            <a class="test" href="choose.html" target="_blank">
                <button>Order Now</button></a>
        </div>

        <div class="card">
            <img src="imags/vanilla.jpg">
            <h3>Vanilla</h3>
            <div class="price">₹100</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>

        <div class="card">
            <img src="imags/mango.jpg">
            <h3>Mango</h3>
            <div class="price">₹130</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>
         <div class="card">
            <img src="imags/blackforest.jpg">
            <h3>Black Forest</h3>
            <div class="price">₹150</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>

         <div class="card">
            <img src="imags/pistachio.jpg">
            <h3>Pistachio</h3>
            <div class="price">₹220</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>

         <div class="card">
            <img src="imags/butterscotch.jpg">
            <h3>Butterscotch</h3>
            <div class="price">₹190</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>

         <div class="card">
            <img src="imags/kulfi.jpg">
            <h3>Kulfi</h3>
            <div class="price">₹140</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>

         <div class="card">
            <img src="imags/nut.jpg">
            <h3>Nuts</h3>
            <div class="price">₹120</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>
        </div>

         <div class="card">
            <img src="imags/almond.jpg">

            <div class="price">₹160</div>
        <a class="test" href="choose.html" target="_blank"><button>Order Now</button></a>

    </div>
</section>

</body>
</html>
